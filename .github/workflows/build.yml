name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Build with Maven
      run: mvn clean package -DskipTests
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    # STEP 1: DOCKER BUILD - Creates the image locally
    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/crud-service:latest .
        docker build -t ${{ secrets.DOCKER_USERNAME }}/crud-service:${{ github.sha }} .
    
    # STEP 2: DOCKER PUSH - Uploads to Docker Hub (THIS IS WHERE PUSH HAPPENS)
    - name: Push Docker image to Docker Hub
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/crud-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/crud-service:${{ github.sha }}